name: Update from Betterfox

on:
  schedule:
    - cron: "0 1 2 * *"  # 01:00 UTC on day 2 of each month
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
	  
      - uses: actions/setup-python@v5
        with:
		  python-version: '3.x'

      - name: Build user.js from upstream Betterfox
        run: python build.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          VERSION=$(grep -oP 'version:\s*\K\d+' upstream/betterfox.js | head -1)
          git add user.js upstream/betterfox.js
          git commit -m "chore: Updated with Betterfox v${VERSION}"
          git push
